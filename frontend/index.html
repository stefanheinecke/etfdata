<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9614544934238374"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoETF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --green-50:  #e7f7f4;
        --green-100: #c8f1e8;
        --green-200: #9be7d8;
        --green-400: #30c8ae;
        --green-500: #00c9a7;
        --green-600: #009f86;
        --green-700: #0f4c81;
        --green-800: #0b3b65;
        --bg:        #f8f9fb;
        --bg-2:      #f3f6fa;
        --bg-3:      #edf2f7;
        --surface:   #ffffff;
        --surface-2: #f6f8fc;
        --border:    #e5e7eb;
        --text:      #111827;
        --text-2:    #1f2937;
        --text-muted:#6b7280;
        --shadow:    0 1px 3px rgba(15,76,129,.08), 0 1px 2px rgba(15,76,129,.06);
        --shadow-md: 0 4px 8px rgba(15,76,129,.1), 0 2px 4px rgba(15,76,129,.08);
        --shadow-lg: 0 10px 24px rgba(15,76,129,.12), 0 6px 10px rgba(15,76,129,.08);
        --radius: 12px;
        --radius-sm: 8px;
      }
      [data-theme="dark"] {
        --bg:        #111827;
        --bg-2:      #1f2937;
        --bg-3:      #273447;
        --surface:   #1f2937;
        --surface-2: #253247;
        --border:    #334155;
        --text:      #f3f4f6;
        --text-2:    #e5e7eb;
        --text-muted:#9ca3af;
        --shadow:    0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
        --shadow-md: 0 4px 6px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
        --shadow-lg: 0 10px 15px rgba(0,0,0,.4), 0 4px 6px rgba(0,0,0,.3);
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: background .3s, color .3s;
        line-height: 1.6;
      }
      #app { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
